<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Everly - Professional AI Legal Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap');
        
        :root {
            --emerald-950: #022c22;
            --gold-500: #d4af37;
            --gold-400: #fbbf24;
            --bg-dark: #011410;
        }

        body {
            background-color: var(--bg-dark);
            color: #f0fdf4;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .serif-text { font-family: 'Lora', serif; }
        .display-font { font-family: 'Playfair Display', serif; }

        .glass-header {
            background: rgba(2, 44, 34, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--gold-500);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .nav-btn.active {
            background: var(--gold-500);
            color: var(--emerald-950);
        }

        .tab-section { display: none; }
        .tab-section.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .input-card {
            background: rgba(6, 78, 59, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #f0fdf4;
            resize: none;
            font-size: 1rem;
            line-height: 1.6;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold-500), var(--gold-400));
            color: var(--emerald-950);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: all 0.3s;
        }

        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .legal-paper {
            background: #ffffff;
            color: #1a202c;
            padding: 5rem 4rem;
            border-radius: 2px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            position: relative;
        }

        .legal-paper::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 8px;
            background: var(--gold-500);
        }

        .loading-dot {
            width: 10px; height: 10px;
            background: var(--gold-500);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 0.6s infinite alternate;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce { to { opacity: 0.3; transform: translateY(-5px); } }

        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
            .legal-paper { box-shadow: none; padding: 0; margin: 0; }
        }
    </style>
</head>
<body class="antialiased">

    <header class="glass-header sticky top-0 z-50 no-print">
        <div class="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gold-500 p-2 rounded-lg">
                    <i class="fas fa-gavel text-emerald-950"></i>
                </div>
                <span class="display-font text-xl font-bold text-white italic">Don Everly AI.</span>
            </div>
            <button onclick="clearAll()" class="text-gold-500/50 hover:text-red-400 transition-colors">
                <i class="fas fa-sync"></i> Reset
            </button>
        </div>
        <div class="max-w-6xl mx-auto px-6 pb-2 flex gap-2 overflow-x-auto no-scrollbar">
            <button onclick="showTab('input')" id="nav-input" class="nav-btn active">Input Data</button>
            <button onclick="showTab('output')" id="nav-output" class="nav-btn">Artikel Hasil</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto py-10 px-6">
        
        <!-- SECTION: INPUT -->
        <section id="tab-input" class="tab-section active space-y-8">
            <div class="flex items-center justify-between">
                <h2 class="display-font text-3xl font-bold text-gold-500">Repositori Bahan</h2>
                <div class="text-[10px] text-emerald-400/60 font-mono">READY FOR SYNTHESIS</div>
            </div>
            
            <div class="input-card">
                <label class="block text-[10px] font-black text-gold-500 uppercase tracking-widest mb-3">Materi Hukum, Kronologi & Fakta</label>
                <textarea id="data-bahan" oninput="saveData()" class="min-h-[250px]" placeholder="Masukkan yurisprudensi, keterangan ahli, atau ringkasan fakta persidangan selengkap mungkin..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-card">
                    <label class="block text-[10px] font-black text-gold-500 uppercase tracking-widest mb-3">Pertimbangan Hakim (Ratio Decidendi)</label>
                    <textarea id="data-pertimbangan" oninput="saveData()" class="min-h-[150px]" placeholder="Apa alasan hukum utama hakim dalam memutus perkara ini?"></textarea>
                </div>
                <div class="input-card">
                    <label class="block text-[10px] font-black text-gold-500 uppercase tracking-widest mb-3">Catatan/Visi Pimpinan</label>
                    <textarea id="data-pimpinan" oninput="saveData()" class="min-h-[150px]" placeholder="Arahan strategis atau kebijakan hukum yang ditekankan pimpinan..."></textarea>
                </div>
            </div>

            <div class="pt-4">
                <button id="btn-process" onclick="generateAISynthesis()" class="btn-primary w-full py-6 rounded-2xl text-lg flex items-center justify-center gap-4 group">
                    <span id="btn-text">MULAI SINTESIS ARTIKEL AI</span>
                    <i class="fas fa-brain group-hover:rotate-12 transition-transform"></i>
                </button>
                
                <div id="loading-state" class="hidden mt-6 text-center space-y-4">
                    <div class="flex justify-center gap-2">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                    <p id="loading-msg" class="text-xs text-gold-500/70 font-mono uppercase tracking-[0.2em]">Menghubungkan ke Mesin Hukum...</p>
                </div>
            </div>
        </section>

        <!-- SECTION: OUTPUT -->
        <section id="tab-output" class="tab-section">
            <div id="output-ready" class="hidden">
                <div class="legal-paper serif-text">
                    <h1 id="res-title" class="display-font text-4xl md:text-5xl font-bold text-center mb-16 leading-tight border-b-2 border-gray-100 pb-12"></h1>
                    <div id="res-content" class="text-lg leading-[2.2] text-gray-800 space-y-8 text-justify first-letter:text-6xl first-letter:font-bold first-letter:mr-3 first-letter:float-left first-letter:text-gold-500"></div>
                    
                    <div class="mt-24 pt-10 border-t border-gray-100 italic text-sm text-gray-400 flex flex-col md:flex-row justify-between gap-4">
                        <span>Penulis: Don Everly Malubaya, S.H., M.H.</span>
                        <span id="res-date"></span>
                    </div>
                </div>
                
                <div class="mt-12 flex flex-col sm:flex-row gap-4 no-print">
                    <button onclick="copyToClipboard()" class="flex-1 bg-emerald-900 text-gold-500 py-5 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-emerald-800 transition-all">
                        <i class="fas fa-copy"></i> SALIN NASKAH
                    </button>
                    <button onclick="window.print()" class="flex-1 bg-gold-500 text-emerald-950 py-5 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-gold-400 transition-all">
                        <i class="fas fa-print"></i> EKSPOR PDF
                    </button>
                </div>
            </div>

            <div id="output-empty" class="text-center py-32 opacity-20 flex flex-col items-center">
                <i class="fas fa-feather-alt text-7xl mb-6"></i>
                <p class="text-xl italic">Naskah belum dibuat. Silakan masukkan data di tab Input.</p>
            </div>
        </section>

    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gold-500 text-emerald-950 px-8 py-4 rounded-2xl text-xs font-black uppercase tracking-widest shadow-2xl opacity-0 translate-y-10 transition-all duration-500 pointer-events-none z-[100]"></div>

    <script>
        const apiKey = ""; // Disediakan oleh environment

        function showTab(id) {
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            window.scrollTo(0,0);
        }

        function saveData() {
            localStorage.setItem('de_ai_bahan', document.getElementById('data-bahan').value);
            localStorage.setItem('de_ai_pertimbangan', document.getElementById('data-pertimbangan').value);
            localStorage.setItem('de_ai_pimpinan', document.getElementById('data-pimpinan').value);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                t.classList.add('opacity-0', 'translate-y-10');
                t.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        async function callGeminiAI(prompt, systemInstruction) {
            let retries = 5;
            let delay = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemInstruction }] },
                            generationConfig: { 
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        judul: { type: "STRING" },
                                        naskah: { type: "STRING" }
                                    },
                                    required: ["judul", "naskah"]
                                }
                            }
                        })
                    });

                    if (!response.ok) throw new Error("API_ERROR");
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        async function generateAISynthesis() {
            const bahan = document.getElementById('data-bahan').value;
            const pertimbangan = document.getElementById('data-pertimbangan').value;
            const pimpinan = document.getElementById('data-pimpinan').value;

            if (!bahan || !pertimbangan) {
                showToast("INPUT DATA BELUM LENGKAP!");
                return;
            }

            const btn = document.getElementById('btn-process');
            const loading = document.getElementById('loading-state');
            const msg = document.getElementById('loading-msg');

            btn.disabled = true;
            btn.classList.add('hidden');
            loading.classList.remove('hidden');

            const statusMsgs = [
                "Menganalisis Fakta Persidangan...",
                "Mengkorelasi Rasio Decidendi...",
                "Menyelaraskan Visi Pimpinan...",
                "Menyusun Narasi Hukum Ilmiah...",
                "Finalisasi Gaya Bahasa..."
            ];

            let step = 0;
            const msgInterval = setInterval(() => {
                msg.innerText = statusMsgs[step % statusMsgs.length];
                step++;
            }, 1500);

            const systemPrompt = `Anda adalah seorang ahli hukum senior, panitera ahli, dan penulis jurnal hukum terkemuka. 
            Tugas Anda adalah membuat artikel hukum yang sangat profesional, elegan, dan mendalam.
            Hubungkan ketiga input (Bahan, Pertimbangan, Visi) menjadi satu kesatuan narasi yang mengalir. 
            Gunakan diksi hukum tingkat tinggi (latin jika perlu) namun tetap enak dibaca. 
            Artikel harus terdiri dari minimal 4-5 paragraf panjang.
            Output HARUS JSON dengan key: "judul" dan "naskah".`;

            const userPrompt = `Input untuk Artikel:
            1. Bahan & Fakta: ${bahan}
            2. Pertimbangan Hakim: ${pertimbangan}
            3. Visi/Catatan Pimpinan: ${pimpinan}
            
            Buatlah artikel ilmiah yang menghubungkan ketiga poin tersebut secara cerdas.`;

            try {
                const result = await callGeminiAI(userPrompt, systemPrompt);
                renderResult(result.judul, result.naskah);
                showTab('output');
                showToast("SINTESIS AI BERHASIL!");
            } catch (err) {
                console.error(err);
                showToast("GAGAL MENGHUBUNGI AI. COBA LAGI.");
            } finally {
                clearInterval(msgInterval);
                btn.disabled = false;
                btn.classList.remove('hidden');
                loading.classList.add('hidden');
            }
        }

        function renderResult(judul, naskah) {
            document.getElementById('res-title').innerText = judul;
            // Ubah newline menjadi paragraf HTML
            const paragraphs = naskah.split('\n').filter(p => p.trim() !== "");
            document.getElementById('res-content').innerHTML = paragraphs.map(p => `<p>${p}</p>`).join("");
            
            document.getElementById('res-date').innerText = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('output-ready').classList.remove('hidden');
            document.getElementById('output-empty').classList.add('hidden');
            
            localStorage.setItem('de_last_judul', judul);
            localStorage.setItem('de_last_naskah', naskah);
        }

        function copyToClipboard() {
            const title = document.getElementById('res-title').innerText;
            const content = document.getElementById('res-content').innerText;
            const fullText = `${title}\n\n${content}`;
            
            const el = document.createElement('textarea');
            el.value = fullText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("NASKAH DISALIN KE CLIPBOARD!");
        }

        function clearAll() {
            if (confirm("Reset semua data dan mulai dari awal?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = () => {
            document.getElementById('data-bahan').value = localStorage.getItem('de_ai_bahan') || '';
            document.getElementById('data-pertimbangan').value = localStorage.getItem('de_ai_pertimbangan') || '';
            document.getElementById('data-pimpinan').value = localStorage.getItem('de_ai_pimpinan') || '';
            
            const lastJ = localStorage.getItem('de_last_judul');
            const lastN = localStorage.getItem('de_last_naskah');
            if (lastJ && lastN) renderResult(lastJ, lastN);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Everly Article - AI Legal Synthesis Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary-dark: #022c22;
            --primary: #064e3b;
            --primary-light: #065f46;
            --secondary: #d4af37;
            --secondary-bright: #fbbf24;
            --bg-dark: #011c15;
            --text-gold: #fde68a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ecfdf5;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.01em;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Navigasi Kaca & Efek Blur */
        .glass-nav {
            background: rgba(2, 44, 34, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 2px solid var(--secondary);
            transition: all 0.3s ease;
        }

        /* Kontainer Navigasi Tab */
        .nav-container {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .nav-container::-webkit-scrollbar { display: none; }

        .nav-link {
            padding: 0.85rem 1.5rem;
            border-radius: 0.85rem;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-gold);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid rgba(212, 175, 55, 0.15);
            background: rgba(6, 78, 59, 0.3);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-link:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--secondary);
            transform: translateY(-1px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, var(--secondary), var(--secondary-bright));
            color: var(--primary-dark);
            box-shadow: 0 10px 20px -5px rgba(212, 175, 55, 0.4);
            border-color: var(--secondary);
        }

        /* Konten Tab Responsif */
        .tab-content {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tab-content.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Editor Textarea */
        textarea {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            line-height: 1.8;
            color: #ecfdf5;
            resize: none;
            transition: height 0.2s ease;
        }

        .editor-box {
            background: rgba(4, 62, 50, 0.6);
            padding: 2rem;
            border-radius: 1.5rem;
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
        }

        .editor-box:focus-within {
            border-color: var(--secondary);
            background: rgba(5, 74, 60, 0.9);
            box-shadow: 0 0 0 1px var(--secondary), 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        .section-label {
            font-size: 0.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: var(--secondary);
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-label i { font-size: 0.9rem; }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, var(--secondary), transparent);
            opacity: 0.2;
        }

        /* Kartu AI Premium */
        .ai-card {
            background: linear-gradient(145deg, #022c22, #043e32);
            border: 2px solid var(--secondary);
            position: relative;
            overflow: hidden;
        }

        .ai-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Animasi Loading */
        .loading-ring {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(2, 44, 34, 0.2);
            border-radius: 50%;
            border-top-color: var(--primary-dark);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (min-width: 1024px) {
            ::-webkit-scrollbar { width: 8px; }
            ::-webkit-scrollbar-track { background: var(--bg-dark); }
            ::-webkit-scrollbar-thumb { 
                background: var(--primary-light); 
                border-radius: 10px;
                border: 2px solid var(--bg-dark);
            }
            ::-webkit-scrollbar-thumb:hover { background: var(--secondary); }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header & Navigasi -->
    <header class="glass-nav sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-between items-center h-24">
                <!-- Logo -->
                <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
                    <div class="w-12 h-12 bg-gradient-to-br from-emerald-800 to-black rounded-2xl flex items-center justify-center shadow-xl border border-yellow-600/50 rotate-3 transition-transform hover:rotate-0">
                        <i class="fas fa-gavel text-yellow-500 text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-2xl tracking-tighter text-white leading-none">Don Everly<span class="text-yellow-500">.</span></h1>
                        <p class="text-[9px] font-bold text-yellow-600/80 uppercase tracking-[0.3em] mt-1">Law Synthesis Engine</p>
                    </div>
                </div>
                
                <!-- Alat Aksi -->
                <div class="flex items-center gap-3">
                    <div class="hidden sm:flex badge-word px-4 py-2 bg-emerald-950/50 border border-yellow-600/30 rounded-xl text-[10px] font-black text-yellow-500" id="word-count">
                        0 KATA
                    </div>
                    <button onclick="clearData()" class="p-3 rounded-xl bg-emerald-900/50 text-yellow-500 border border-yellow-600/20 hover:bg-red-900/20 hover:text-red-400 transition-colors" title="Bersihkan Data">
                        <i class="fas fa-trash-alt text-sm"></i>
                    </button>
                    <button onclick="window.print()" class="bg-yellow-500 text-emerald-950 px-6 py-3 rounded-xl text-xs font-black hover:bg-yellow-400 transition-all flex items-center gap-2 shadow-lg hover:shadow-yellow-500/20 active:scale-95">
                        <i class="fas fa-print"></i> <span class="hidden sm:inline">CETAK</span> NASKAH
                    </button>
                </div>
            </div>
            
            <!-- Tab Navigasi -->
            <nav class="nav-container pb-3">
                <button onclick="switchTab('tab-bahan')" class="nav-link active" id="link-bahan">
                    <i class="fas fa-folder-open"></i> Bahan
                </button>
                <button onclick="switchTab('tab-pertimbangan')" class="nav-link" id="link-pertimbangan">
                    <i class="fas fa-balance-scale"></i> Pertimbangan Hakim
                </button>
                <button onclick="switchTab('tab-pimpinan')" class="nav-link" id="link-pimpinan">
                    <i class="fas fa-user-shield"></i> Pimpinan PN
                </button>
                <button onclick="switchTab('tab-artikel')" class="nav-link" id="link-artikel">
                    <i class="fas fa-magic"></i> Buat Artikel
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto py-12 px-6">
        
        <!-- Tab: Bahan -->
        <section id="tab-bahan" class="tab-content active">
            <div class="editor-box">
                <label class="section-label"><i class="fas fa-database"></i> Database Bahan Hukum</label>
                <textarea id="input-bahan" oninput="saveAndResize(this)" placeholder="Input yurisprudensi, fakta persidangan, dan landasan teori hukum di sini..." class="text-base font-medium placeholder:text-emerald-800/50 min-h-[300px]"></textarea>
            </div>
        </section>

        <!-- Tab: Pertimbangan Hakim -->
        <section id="tab-pertimbangan" class="tab-content">
            <div class="editor-box border-l-[6px] border-yellow-500">
                <label class="section-label text-yellow-500"><i class="fas fa-pen-fancy"></i> Rasio Decidendi</label>
                <textarea id="input-pertimbangan" oninput="saveAndResize(this)" placeholder="Uraikan pertimbangan hukum hakim Don Everly Malubaya secara mendalam..." class="text-lg font-bold text-white placeholder:text-emerald-800/50 min-h-[300px]"></textarea>
            </div>
        </section>

        <!-- Tab: Pimpinan PN -->
        <section id="tab-pimpinan" class="tab-content">
            <div class="editor-box">
                <label class="section-label"><i class="fas fa-bullseye"></i> Perspektif Strategis</label>
                <textarea id="input-pimpinan" oninput="saveAndResize(this)" placeholder="Masukkan arahan atau poin kebijakan dari Pimpinan PN..." class="text-base font-medium placeholder:text-emerald-800/50 min-h-[300px]"></textarea>
            </div>
        </section>

        <!-- Tab: Buat Artikel -->
        <section id="tab-artikel" class="tab-content space-y-12">
            <div class="ai-card p-10 sm:p-16 rounded-[2.5rem] text-center shadow-2xl">
                <div class="w-20 h-20 bg-gradient-to-br from-yellow-400 to-yellow-600 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-2xl rotate-12">
                    <i class="fas fa-wand-magic-sparkles text-emerald-950 text-3xl"></i>
                </div>
                
                <h3 class="font-black text-3xl text-yellow-500 mb-4 tracking-tighter">PREMIUM SYNTHESIS</h3>
                <p class="text-sm text-emerald-200/80 mb-10 max-w-sm mx-auto leading-relaxed">Intelligence Engine akan mengonversi seluruh data input menjadi artikel hukum ilmiah yang prestisius.</p>
                
                <button id="ai-button" onclick="generateAIArticle()" class="w-full sm:w-auto bg-gradient-to-r from-yellow-500 to-yellow-600 hover:from-yellow-400 hover:to-yellow-500 text-emerald-950 px-12 py-5 rounded-2xl font-black text-xs transition-all flex items-center justify-center gap-4 mx-auto uppercase tracking-[0.2em] shadow-xl hover:scale-[1.02] active:scale-95 group">
                    <span id="button-text">MULAI GENERASI NASKAH</span>
                    <i class="fas fa-chevron-right text-[10px] transition-transform group-hover:translate-x-1"></i>
                </button>
            </div>

            <!-- Bagian Hasil -->
            <div id="article-output" class="hidden space-y-8 animate-in fade-in duration-1000">
                <div class="editor-box bg-emerald-950/40">
                    <label class="section-label"><i class="fas fa-heading"></i> Judul Terpilih</label>
                    <textarea id="art-title" oninput="saveAndResize(this)" class="text-3xl font-black text-yellow-500 tracking-tight leading-tight"></textarea>
                </div>

                <div class="editor-box bg-emerald-950/40">
                    <label class="section-label"><i class="fas fa-align-left"></i> Naskah Lengkap</label>
                    <textarea id="art-content" oninput="saveAndResize(this)" class="text-lg leading-loose text-emerald-50"></textarea>
                </div>

                <div class="flex flex-col sm:flex-row items-center justify-center gap-4 py-8">
                    <button onclick="copyFullText()" class="w-full sm:w-auto bg-yellow-500 text-emerald-950 px-10 py-5 rounded-2xl font-black shadow-xl hover:bg-yellow-400 transition-all flex items-center justify-center gap-3 active:scale-95">
                        <i class="fas fa-copy"></i> SALIN TEKS
                    </button>
                    <button onclick="window.print()" class="w-full sm:w-auto bg-emerald-800 text-white px-10 py-5 rounded-2xl font-black border border-emerald-600 hover:bg-emerald-700 transition-all flex items-center justify-center gap-3 active:scale-95">
                        <i class="fas fa-print"></i> CETAK NASKAH
                    </button>
                </div>
            </div>
        </section>

    </main>

    <!-- Notifikasi Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-yellow-500 text-emerald-950 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-2xl opacity-0 transition-all duration-500 pointer-events-none z-[100] flex items-center gap-3 border-2 border-emerald-950">
        <i class="fas fa-info-circle"></i>
        <span id="toast-msg">Sistem Inisialisasi</span>
    </div>

    <script>
        const apiKey = ""; // Kunci API disediakan secara otomatis di runtime

        // Helper Penyimpanan Lokal
        const storageKeys = {
            bahan: 'de_bahan',
            pimpinan: 'de_pimpinan',
            pertimbangan: 'de_pertimbangan',
            title: 'de_art_title',
            content: 'de_art_content'
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });
            
            const activeTab = document.getElementById(tabId);
            activeTab.classList.add('active');
            document.getElementById('link-' + tabId.replace('tab-', '')).classList.add('active');
            
            const textareas = activeTab.querySelectorAll('textarea');
            textareas.forEach(ta => autoHeight(ta));
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /**
         * Implementasi Exponential Backoff untuk memanggil Gemini API
         */
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    
                    // Jangan ulangi jika kesalahan klien (kecuali rate limit 429)
                    if (response.status !== 429 && response.status < 500) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || "Kesalahan Permintaan");
                    }
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                }
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2;
            }
        }

        async function generateAIArticle() {
            const btn = document.getElementById('ai-button');
            const btnText = document.getElementById('button-text');
            const bahan = document.getElementById('input-bahan').value;
            const pimpinan = document.getElementById('input-pimpinan').value;
            const pertimbangan = document.getElementById('input-pertimbangan').value;

            if (!bahan.trim() && !pertimbangan.trim()) {
                showToast("Berikan minimal Bahan atau Pertimbangan Hakim.");
                return;
            }

            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            btnText.innerHTML = `<div class="loading-ring mr-2"></div> MENYUSUN ARTIKEL...`;

            const systemPrompt = `Anda adalah 'Don Everly Article Intelligence'. Buat artikel hukum prestisius dalam Bahasa Indonesia. Struktur: Judul Akademik dan Konten Artikel Ilmiah. Respon HARUS dalam format JSON murni: { "judul": "...", "konten": "..." }`;
            const userQuery = `Sintesis artikel hukum dari: 
            [DATA BAHAN]: ${bahan}
            [PERSPEKTIF PIMPINAN]: ${pimpinan}
            [PERTIMBANGAN HAKIM]: ${pertimbangan}`;

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            try {
                const result = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 0.7 
                        }
                    })
                });

                const aiResult = JSON.parse(result.candidates[0].content.parts[0].text);
                
                const outDiv = document.getElementById('article-output');
                outDiv.classList.remove('hidden');
                
                const titleField = document.getElementById('art-title');
                const contentField = document.getElementById('art-content');
                
                titleField.value = aiResult.judul;
                contentField.value = aiResult.konten;
                
                localStorage.setItem(storageKeys.title, aiResult.judul);
                localStorage.setItem(storageKeys.content, aiResult.konten);
                
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btnText.innerText = "GENERASI ULANG";
                
                setTimeout(() => {
                    autoHeight(titleField);
                    autoHeight(contentField);
                    updateWordCount();
                    outDiv.scrollIntoView({ behavior: 'smooth' });
                }, 150);

                showToast("Naskah Berhasil Disusun!");

            } catch (error) {
                console.error(error);
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btnText.innerText = "COBA LAGI";
                showToast("Gagal memproses data. Silakan coba lagi.");
            }
        }

        function saveAndResize(el) {
            autoHeight(el);
            updateWordCount();
            
            const map = {
                'input-bahan': storageKeys.bahan,
                'input-pimpinan': storageKeys.pimpinan,
                'input-pertimbangan': storageKeys.pertimbangan,
                'art-title': storageKeys.title,
                'art-content': storageKeys.content
            };
            
            if (map[el.id]) {
                localStorage.setItem(map[el.id], el.value);
            }
        }

        function autoHeight(element) {
            element.style.height = "auto";
            element.style.height = (element.scrollHeight) + "px";
        }

        function updateWordCount() {
            const textareas = document.querySelectorAll('textarea');
            let total = 0;
            textareas.forEach(ta => {
                const text = ta.value.trim();
                if (text) total += text.split(/\s+/).filter(word => word.length > 0).length;
            });
            document.getElementById('word-count').innerText = total + " KATA";
        }

        function clearData() {
            if (confirm("Hapus seluruh data yang sudah diketik?")) {
                Object.values(storageKeys).forEach(key => localStorage.removeItem(key));
                document.querySelectorAll('textarea').forEach(ta => {
                    ta.value = "";
                    autoHeight(ta);
                });
                document.getElementById('article-output').classList.add('hidden');
                updateWordCount();
                showToast("Data Telah Dibersihkan");
            }
        }

        function copyFullText() {
            const title = document.getElementById('art-title').value;
            const content = document.getElementById('art-content').value;
            const fullText = `${title}\n\n${content}`;
            
            const el = document.createElement('textarea');
            el.value = fullText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast("Naskah Berhasil Salin");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('opacity-0');
            toast.classList.add('translate-y-[-20px]');
            setTimeout(() => {
                toast.classList.add('opacity-0');
                toast.classList.remove('translate-y-[-20px]');
            }, 3000);
        }

        window.onload = () => {
            document.getElementById('input-bahan').value = localStorage.getItem(storageKeys.bahan) || "";
            document.getElementById('input-pimpinan').value = localStorage.getItem(storageKeys.pimpinan) || "";
            document.getElementById('input-pertimbangan').value = localStorage.getItem(storageKeys.pertimbangan) || "";
            
            const savedTitle = localStorage.getItem(storageKeys.title);
            const savedContent = localStorage.getItem(storageKeys.content);
            
            if (savedTitle || savedContent) {
                document.getElementById('article-output').classList.remove('hidden');
                document.getElementById('art-title').value = savedTitle || "";
                document.getElementById('art-content').value = savedContent || "";
            }

            document.querySelectorAll('textarea').forEach(ta => {
                autoHeight(ta);
            });
            updateWordCount();
        };
    </script>
</body>
</html>

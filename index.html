<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Everly - Professional Legal Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap');
        
        :root {
            --emerald-950: #022c22;
            --gold-500: #d4af37;
            --gold-400: #fbbf24;
            --bg-dark: #011410;
        }

        body {
            background-color: var(--bg-dark);
            color: #f0fdf4;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .serif-text { font-family: 'Lora', serif; }
        .display-font { font-family: 'Playfair Display', serif; }

        .glass-header {
            background: rgba(2, 44, 34, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--gold-500);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .nav-btn.active {
            background: var(--gold-500);
            color: var(--emerald-950);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .tab-section { display: none; opacity: 0; transform: translateY(10px); }
        .tab-section.active { 
            display: block; 
            opacity: 1; 
            transform: translateY(0);
            transition: all 0.5s ease;
        }

        .input-card {
            background: rgba(6, 78, 59, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 24px;
            padding: 1.5rem;
            transition: border-color 0.3s ease;
        }

        .input-card:focus-within {
            border-color: var(--gold-500);
            background: rgba(6, 78, 59, 0.3);
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #f0fdf4;
            resize: none;
            font-size: 1rem;
            line-height: 1.6;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold-500), var(--gold-400));
            color: var(--emerald-950);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            box-shadow: 0 10px 30px -10px rgba(212, 175, 55, 0.5);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px -10px rgba(212, 175, 55, 0.6);
        }

        .btn-primary:active { transform: scale(0.98); }

        /* Hasil Akhir - Kertas Putih Eksklusif */
        .legal-paper {
            background: #ffffff;
            color: #1a202c;
            padding: 5rem 4rem;
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            position: relative;
        }

        .legal-paper::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 8px;
            background: var(--gold-500);
        }

        .loading-dot {
            width: 10px; height: 10px;
            background: var(--gold-500);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 0.6s infinite alternate;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce { to { opacity: 0.3; transform: translateY(-5px); } }

        @media print {
            body { background: white; color: black; }
            .no-print { display: none !important; }
            .legal-paper { box-shadow: none; padding: 0; margin: 0; border: none; }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navigasi -->
    <header class="glass-header sticky top-0 z-50 no-print">
        <div class="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gold-500 p-2 rounded-lg">
                    <i class="fas fa-gavel text-emerald-950"></i>
                </div>
                <span class="display-font text-xl font-bold italic tracking-tight text-white underline decoration-gold-500/50">Don Everly.</span>
            </div>
            <div class="flex gap-2">
                <button onclick="clearAll()" class="p-3 text-gold-500/50 hover:text-red-400 transition-colors">
                    <i class="fas fa-trash-alt"></i>
                </button>
                <button onclick="window.print()" class="bg-emerald-900 text-gold-500 px-6 py-2 rounded-xl text-[10px] font-black border border-gold-500/20">
                    EKSPOR PDF
                </button>
            </div>
        </div>
        <div class="max-w-6xl mx-auto px-6 pb-2">
            <div class="flex gap-1 overflow-x-auto no-scrollbar">
                <button onclick="showTab('input')" id="nav-input" class="nav-btn active">Input Data</button>
                <button onclick="showTab('generate')" id="nav-generate" class="nav-btn">Sintesis</button>
                <button onclick="showTab('output')" id="nav-output" class="nav-btn">Artikel</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto py-12 px-6">
        
        <!-- TAB: INPUT -->
        <section id="tab-input" class="tab-section active space-y-8">
            <div class="space-y-4">
                <h2 class="display-font text-3xl font-bold text-gold-500">Repositori Bahan</h2>
                <div class="input-card">
                    <label class="block text-[10px] font-black text-gold-500/60 uppercase tracking-[0.2em] mb-4">Materi Hukum & Kronologi</label>
                    <textarea id="data-bahan" oninput="saveData()" class="min-h-[250px]" placeholder="Tempelkan yurisprudensi, keterangan ahli, atau ringkasan fakta persidangan di sini..."></textarea>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="input-card">
                    <label class="block text-[10px] font-black text-gold-500/60 uppercase tracking-[0.2em] mb-4">Pertimbangan Hakim</label>
                    <textarea id="data-pertimbangan" oninput="saveData()" class="min-h-[150px]" placeholder="Poin-poin rasio decidendi..."></textarea>
                </div>
                <div class="input-card">
                    <label class="block text-[10px] font-black text-gold-500/60 uppercase tracking-[0.2em] mb-4">Catatan Pimpinan</label>
                    <textarea id="data-pimpinan" oninput="saveData()" class="min-h-[150px]" placeholder="Arahan kebijakan/perspektif PN..."></textarea>
                </div>
            </div>

            <div class="pt-8">
                <button onclick="showTab('generate')" class="btn-primary w-full py-5 rounded-2xl flex items-center justify-center gap-3">
                    Proses Naskah <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </section>

        <!-- TAB: GENERATE -->
        <section id="tab-generate" class="tab-section space-y-12 py-10">
            <div class="text-center space-y-6">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-gold-500/10 rounded-full border border-gold-500/30 text-gold-500 text-3xl mb-4">
                    <i class="fas fa-brain"></i>
                </div>
                <h2 class="display-font text-4xl font-bold text-white">Sintesis Intelegensia</h2>
                <p class="text-emerald-200/50 max-w-lg mx-auto">AI akan merumuskan narasi hukum yang mensinergikan fakta dan pertimbangan menjadi artikel ilmiah berkualitas tinggi.</p>
            </div>

            <div class="max-w-md mx-auto space-y-4">
                <button id="btn-start" onclick="executeSynthesis()" class="btn-primary w-full py-6 rounded-2xl text-sm flex items-center justify-center gap-4">
                    <span>KONSTRUKSI ARTIKEL</span>
                </button>
                <div id="loading-state" class="hidden text-center space-y-3">
                    <div class="flex justify-center gap-1">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                    <p id="loading-text" class="text-[10px] text-gold-500/60 uppercase tracking-widest">Menghubungkan ke Mesin Hukum...</p>
                </div>
            </div>
        </section>

        <!-- TAB: OUTPUT -->
        <section id="tab-output" class="tab-section">
            <div id="output-ready" class="hidden">
                <div class="legal-paper serif-text shadow-2xl">
                    <h1 id="res-title" class="display-font text-4xl md:text-5xl font-bold text-center mb-16 leading-tight border-b-2 border-gray-100 pb-10"></h1>
                    <div id="res-content" class="text-lg leading-[2] text-gray-800 space-y-8 text-justify first-letter:text-5xl first-letter:font-bold first-letter:mr-3 first-letter:float-left"></div>
                    
                    <div class="mt-20 pt-10 border-t border-gray-100 italic text-sm text-gray-400 flex justify-between">
                        <span>Oleh: Don Everly Malubaya, S.H., M.H.</span>
                        <span id="res-date"></span>
                    </div>
                </div>
                
                <div class="mt-12 flex flex-col sm:flex-row gap-4 justify-center no-print">
                    <button onclick="copyToClipboard()" class="bg-emerald-900 text-gold-500 px-10 py-5 rounded-2xl font-bold hover:bg-emerald-800 transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-copy"></i> SALIN TEKS
                    </button>
                    <button onclick="window.print()" class="bg-gold-500 text-emerald-950 px-10 py-5 rounded-2xl font-bold hover:bg-gold-400 transition-all flex items-center justify-center gap-3">
                        <i class="fas fa-print"></i> CETAK ARTIKEL
                    </button>
                </div>
            </div>

            <div id="output-empty" class="text-center py-24 opacity-20">
                <i class="fas fa-file-signature text-6xl mb-6"></i>
                <p class="text-xl italic">Silakan lakukan proses sintesis terlebih dahulu.</p>
            </div>
        </section>

    </main>

    <!-- Notifikasi -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gold-500 text-emerald-950 px-8 py-4 rounded-2xl text-xs font-black uppercase tracking-widest shadow-2xl opacity-0 translate-y-10 transition-all duration-500 pointer-events-none z-[100]"></div>

    <script>
        const apiKey = ""; // Kunci API disediakan oleh environment

        function showTab(id) {
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
            window.scrollTo(0, 0);
        }

        function saveData() {
            localStorage.setItem('de_bahan', document.getElementById('data-bahan').value);
            localStorage.setItem('de_pertimbangan', document.getElementById('data-pertimbangan').value);
            localStorage.setItem('de_pimpinan', document.getElementById('data-pimpinan').value);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-10');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 3000);
        }

        async function executeSynthesis() {
            const bahan = document.getElementById('data-bahan').value;
            const pertimbangan = document.getElementById('data-pertimbangan').value;
            const pimpinan = document.getElementById('data-pimpinan').value;

            if (!bahan || !pertimbangan) {
                showToast("INPUT BAHAN & PERTIMBANGAN BELUM LENGKAP!");
                showTab('input');
                return;
            }

            const btn = document.getElementById('btn-start');
            const loading = document.getElementById('loading-state');
            const loadText = document.getElementById('loading-text');

            btn.classList.add('hidden');
            loading.classList.remove('hidden');

            const statusCycles = [
                "Mengurai Struktur Yurisprudensi...",
                "Menganalisis Rasio Decidendi...",
                "Menyelaraskan Visi Strategis...",
                "Menyusun Narasi Akademik..."
            ];

            let i = 0;
            const interval = setInterval(() => {
                loadText.innerText = statusCycles[i % statusCycles.length];
                i++;
            }, 1500);

            try {
                const systemPrompt = `Anda adalah ahli hukum senior dan editor jurnal hukum internasional. 
                Tugas: Menulis artikel hukum ilmiah yang provokatif, mendalam, dan elegan berdasarkan data.
                WAJIB JSON FORMAT: {"judul": "Judul Formal", "konten": "Isi Artikel Min 8 Paragraf"}`;

                const userPrompt = `Data Bahan: ${bahan}\nPertimbangan: ${pertimbangan}\nPerspektif Pimpinan: ${pimpinan}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userPrompt }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                if (!response.ok) throw new Error(`HTTP_ERR_${response.status}`);

                const result = await response.json();
                const data = JSON.parse(result.candidates[0].content.parts[0].text);

                // Update UI
                document.getElementById('res-title').innerText = data.judul;
                // Formatting content into paragraphs
                document.getElementById('res-content').innerHTML = data.konten.split('\n').map(p => p.trim()).filter(p => p).map(p => `<p>${p}</p>`).join('');
                document.getElementById('res-date').innerText = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

                document.getElementById('output-ready').classList.remove('hidden');
                document.getElementById('output-empty').classList.add('hidden');
                
                localStorage.setItem('de_last_title', data.judul);
                localStorage.setItem('de_last_content', data.konten);

                clearInterval(interval);
                showToast("SINTESIS BERHASIL");
                showTab('output');

            } catch (err) {
                console.error(err);
                clearInterval(interval);
                showToast("API ERROR: " + err.message);
                btn.classList.remove('hidden');
                loading.classList.add('hidden');
            }
        }

        function copyToClipboard() {
            const title = document.getElementById('res-title').innerText;
            const content = document.getElementById('res-content').innerText;
            const fullText = `${title}\n\n${content}`;
            
            const area = document.createElement('textarea');
            area.value = fullText;
            document.body.appendChild(area);
            area.select();
            document.execCommand('copy');
            document.body.removeChild(area);
            showToast("TEKS BERHASIL DISALIN");
        }

        function clearAll() {
            if (confirm("Reset seluruh data aplikasi?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = () => {
            document.getElementById('data-bahan').value = localStorage.getItem('de_bahan') || '';
            document.getElementById('data-pertimbangan').value = localStorage.getItem('de_pertimbangan') || '';
            document.getElementById('data-pimpinan').value = localStorage.getItem('de_pimpinan') || '';
            
            const lastT = localStorage.getItem('de_last_title');
            const lastC = localStorage.getItem('de_last_content');
            
            if (lastT && lastC) {
                document.getElementById('res-title').innerText = lastT;
                document.getElementById('res-content').innerHTML = lastC.split('\n').map(p => `<p>${p}</p>`).join('');
                document.getElementById('res-date').innerText = "Arsip Terakhir";
                document.getElementById('output-ready').classList.remove('hidden');
                document.getElementById('output-empty').classList.add('hidden');
            }
        };
    </script>
</body>
</html>

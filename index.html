<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Everly - Professional Legal Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap');
        
        :root {
            --emerald-950: #022c22;
            --gold-500: #d4af37;
            --gold-400: #fbbf24;
            --bg-dark: #011410;
        }

        body {
            background-color: var(--bg-dark);
            color: #f0fdf4;
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .serif-text { font-family: 'Lora', serif; }
        .display-font { font-family: 'Playfair Display', serif; }

        .glass-header {
            background: rgba(2, 44, 34, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--gold-500);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .nav-btn.active {
            background: var(--gold-500);
            color: var(--emerald-950);
        }

        .tab-section { display: none; }
        .tab-section.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .input-card {
            background: rgba(6, 78, 59, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 20px;
            padding: 1.5rem;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #f0fdf4;
            resize: none;
            font-size: 1rem;
            line-height: 1.6;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold-500), var(--gold-400));
            color: var(--emerald-950);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            transition: transform 0.2s;
        }

        .btn-primary:active { transform: scale(0.95); }

        .legal-paper {
            background: #ffffff;
            color: #1a202c;
            padding: 4rem 3rem;
            border-radius: 2px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .legal-paper::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 6px;
            background: var(--gold-500);
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .legal-paper { box-shadow: none; padding: 0; margin: 0; }
        }
    </style>
</head>
<body class="antialiased">

    <header class="glass-header sticky top-0 z-50 no-print">
        <div class="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-gold-500 p-2 rounded-lg">
                    <i class="fas fa-gavel text-emerald-950"></i>
                </div>
                <span class="display-font text-xl font-bold text-white italic">Don Everly.</span>
            </div>
            <button onclick="clearAll()" class="text-gold-500/50 hover:text-red-400"><i class="fas fa-sync"></i> Reset</button>
        </div>
        <div class="max-w-6xl mx-auto px-6 pb-2 flex gap-2">
            <button onclick="showTab('input')" id="nav-input" class="nav-btn active">Input</button>
            <button onclick="showTab('output')" id="nav-output" class="nav-btn">Artikel Hasil</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto py-10 px-6">
        
        <!-- INPUT -->
        <section id="tab-input" class="tab-section active space-y-6">
            <h2 class="display-font text-3xl font-bold text-gold-500">Materi Artikel</h2>
            
            <div class="input-card">
                <label class="block text-[10px] font-black text-gold-500 uppercase mb-2">Bahan Hukum & Kronologi</label>
                <textarea id="data-bahan" oninput="saveData()" class="min-h-[200px]" placeholder="Masukkan fakta persidangan..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="input-card">
                    <label class="block text-[10px] font-black text-gold-500 uppercase mb-2">Pertimbangan Hakim</label>
                    <textarea id="data-pertimbangan" oninput="saveData()" class="min-h-[120px]" placeholder="Masukkan rasio decidendi..."></textarea>
                </div>
                <div class="input-card">
                    <label class="block text-[10px] font-black text-gold-500 uppercase mb-2">Catatan Pimpinan</label>
                    <textarea id="data-pimpinan" oninput="saveData()" class="min-h-[120px]" placeholder="Masukkan visi strategis..."></textarea>
                </div>
            </div>

            <button onclick="executeInstantSynthesis()" class="btn-primary w-full py-5 rounded-xl text-lg flex items-center justify-center gap-3">
                <i class="fas fa-magic"></i> BUAT ARTIKEL SEKARANG
            </button>
        </section>

        <!-- OUTPUT -->
        <section id="tab-output" class="tab-section">
            <div id="output-ready" class="hidden">
                <div class="legal-paper serif-text">
                    <h1 id="res-title" class="display-font text-3xl font-bold text-center mb-10 pb-6 border-b border-gray-200"></h1>
                    <div id="res-content" class="text-lg leading-[1.8] text-gray-800 space-y-6 text-justify"></div>
                    
                    <div class="mt-16 pt-8 border-t border-gray-100 flex justify-between text-sm text-gray-500">
                        <span>Penulis: Don Everly Malubaya, S.H., M.H.</span>
                        <span id="res-date"></span>
                    </div>
                </div>
                <div class="mt-8 flex gap-4 no-print">
                    <button onclick="copyText()" class="flex-1 bg-emerald-900 text-gold-500 py-4 rounded-xl font-bold">SALIN</button>
                    <button onclick="window.print()" class="flex-1 bg-gold-500 text-emerald-950 py-4 rounded-xl font-bold">CETAK PDF</button>
                </div>
            </div>
            <div id="output-empty" class="text-center py-20 opacity-30 italic">
                Belum ada artikel. Isi input dan klik "BUAT ARTIKEL SEKARANG".
            </div>
        </section>

    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gold-500 text-emerald-950 px-6 py-3 rounded-full text-xs font-bold opacity-0 transition-opacity pointer-events-none"></div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }

        function saveData() {
            localStorage.setItem('de_v4_bahan', document.getElementById('data-bahan').value);
            localStorage.setItem('de_v4_pertimbangan', document.getElementById('data-pertimbangan').value);
            localStorage.setItem('de_v4_pimpinan', document.getElementById('data-pimpinan').value);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('opacity-100');
            setTimeout(() => t.classList.remove('opacity-100'), 2000);
        }

        function executeInstantSynthesis() {
            const b = document.getElementById('data-bahan').value;
            const p = document.getElementById('data-pertimbangan').value;
            const v = document.getElementById('data-pimpinan').value;

            if(!b || !p) return showToast("Mohon isi bahan dan pertimbangan!");

            // Sintesis Kalimat secara Instan (Local Engine)
            const judul = "Dialektika Yuridis: Manifestasi Keadilan Substantif Dalam Kerangka Penegakan Hukum Terpadu";
            
            const p1 = `Tinjauan mendalam terhadap perkara ini bermula dari analisis komprehensif atas fakta-fakta hukum yang tersaji: "${b.slice(0, 250)}...". Secara normatif, hal ini mengindikasikan adanya urgensi dalam penataan kembali pemahaman kita terhadap korelasi antara bukti-bukti empiris dan tuntutan keadilan substantif di meja hijau.`;
            
            const p2 = `Majelis Hakim, dalam pertimbangannya yang menonjol: "${p.slice(0, 250)}...", telah menunjukkan keberanian intelektual dalam menerapkan 'ratio decidendi' yang bersifat progresif. Hal ini membuktikan bahwa hukum tidaklah kaku, melainkan sebuah instrumen dinamis yang senantiasa mencari keseimbangan antara kepastian hukum (legal certainty) dan kemanfaatan bagi para pencari keadilan.`;
            
            const p3 = `Sinergi ini diperkuat oleh perspektif pimpinan yang menekankan bahwa: "${v.slice(0, 250) || "Integritas institusi adalah harga mati"}". Arahan strategis ini menjadi kompas bagi setiap insan peradilan agar tidak terjebak dalam positivisme hukum yang sempit, melainkan mampu melihat gambaran besar dari setiap kebijakan hukum yang diputuskan.`;
            
            const p4 = `Sebagai konklusi, sintesis yuridis ini menegaskan pentingnya kolaborasi antara fakta, pertimbangan yang matang, dan visi institusi yang kuat. Hanya dengan jalinan inilah, pengadilan dapat benar-benar mewujudkan fungsinya sebagai benteng terakhir bagi kebenaran dan keadilan yang dicita-citakan oleh masyarakat.`;

            document.getElementById('res-title').innerText = judul;
            document.getElementById('res-content').innerHTML = `<p>${p1}</p><p>${p2}</p><p>${p3}</p><p>${p4}</p>`;
            document.getElementById('res-date').innerText = new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
            
            document.getElementById('output-ready').classList.remove('hidden');
            document.getElementById('output-empty').classList.add('hidden');
            
            showTab('output');
            showToast("ARTIKEL BERHASIL DISUSUN!");
        }

        function copyText() {
            const t = document.getElementById('res-title').innerText;
            const c = document.getElementById('res-content').innerText;
            const area = document.createElement('textarea');
            area.value = t + "\n\n" + c;
            document.body.appendChild(area); area.select();
            document.execCommand('copy');
            document.body.removeChild(area);
            showToast("Teks disalin!");
        }

        function clearAll() {
            if(confirm("Hapus semua data?")) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = () => {
            document.getElementById('data-bahan').value = localStorage.getItem('de_v4_bahan') || '';
            document.getElementById('data-pertimbangan').value = localStorage.getItem('de_v4_pertimbangan') || '';
            document.getElementById('data-pimpinan').value = localStorage.getItem('de_v4_pimpinan') || '';
        };
    </script>
</body>
</html>
